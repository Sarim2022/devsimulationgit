<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>401 Unauthorized Panic | DEV GAME</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050505;
  color:#fff;
  display:flex;
  justify-content:center;
}

.container {
  max-width:750px;
  width:100%;
  padding:20px;
}

.card {
  background:#0c0c0c;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
}

h1 { margin-bottom:10px; }

.terminal {
  font-family:'JetBrains Mono',monospace;
  background:#080808;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  font-size:0.8rem;
  margin-bottom:20px;
  white-space:pre-line;
}

.options button {
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:#111;
  color:#fff;
  cursor:pointer;
  text-align:left;
}

.options button:hover {
  background:#1a1a1a;
}

.complete {
  display:none;
  text-align:center;
}
.complete.show { display:block; }

.btn {
  margin-top:10px;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#111;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>401 Unauthorized Panic 🚨</h1>

    <div id="terminal" class="terminal"></div>
    <div id="options" class="options"></div>

    <div id="complete" class="complete">
      <h2>✅ Fixed!</h2>
      <p>You debugged the API like a real developer.</p>
      <div style="font-family:monospace; margin:10px;">
        check headers → fix token → retry → success
      </div>
      <button class="btn" onclick="restart()">Play Again</button>
    </div>

  </div>
</div>

<script>

const scenes = {

start:{
log:`User: "App says I'm not logged in!"
Console:
GET https://api.myapp.com/user/profile
Status: 401 Unauthorized`,
options:[
{t:"Check request headers",n:"headers"},
{t:"Refresh the page",n:"refresh"},
{t:"Ask user to re-login",n:"relogin"}
]
},

headers:{
log:`You inspect the request headers...

Authorization: Bearer null
X-API-Key: undefined

The auth token is missing!`,
options:[
{t:"Find where the token is set",n:"find_token"},
{t:"Hardcode a token",n:"fail_hardcode"}
]
},

find_token:{
log:`You find the auth service...

function getAuthToken() {
  // TODO: Get token from localStorage
  return null;
}`,
options:[
{t:"Implement localStorage logic",n:"implement_logic"},
{t:"Blame the backend again",n:"fail_blame"}
]
},

implement_logic:{
log:`You fix the function...

function getAuthToken() {
  return localStorage.getItem('authToken');
}

New request sent with "Authorization: Bearer <your_token>"`,
options:[
{t:"Check response",n:"success"}
]
},

success:{
log:`GET /user/profile

200 OK
{ "username": "dev_hero" }

Data loaded successfully!`,
complete:true
},

refresh:{
log:`Page refreshed...

Still broken. The fundamental issue wasn't addressed.`,
options:[
{t:"Debug properly now",n:"start"}
]
},

relogin:{
log:`User re-logins...

Still broken. The app isn't attaching the token correctly.`,
options:[
{t:"Check the headers",n:"headers"}
]
},

fail_hardcode:{
log:`You hardcode a token.

Authorization: Bearer "my_test_token"

Request fails with 401. The token is invalid. This is not a real solution.`,
options:[
{t:"Find the real token logic",n:"find_token"}
]
},

fail_blame:{
log:`You blame the backend. They reply: "No auth token was sent. This is a frontend issue."`,
options:[
{t:"Fine, I'll fix it.",n:"find_token"}
]
}

};

let current="start";

function render(key){
  const s=scenes[key];
  current=key;

  document.getElementById("terminal").textContent=s.log;

  const opt=document.getElementById("options");
  opt.innerHTML="";

  if(s.complete){
    document.getElementById("complete").classList.add("show");
    opt.innerHTML="";
    return;
  }

  document.getElementById("complete").classList.remove("show");

  s.options.forEach(o=>{
    const btn=document.createElement("button");
    btn.innerText=o.t;
    btn.onclick=()=>render(o.n);
    opt.appendChild(btn);
  });
}

function restart(){
  render("start");
}

render("start");

</script>

</body>
</html>
